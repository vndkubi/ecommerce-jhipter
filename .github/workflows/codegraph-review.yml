name: CodeGraph review

# Deterministic PR review: every finding is a code-graph fact (stale callers,
# untested changes, duplication, design smells) — no LLM, no external service.
# Findings land in two places: the Security > Code scanning tab (SARIF) and a
# sticky PR comment that updates in place on every push.
on:
  pull_request:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache CodeGraph index
        uses: actions/cache@v4
        with:
          path: .codegraph
          key: codegraph-${{ github.event.pull_request.base.sha }}
          restore-keys: codegraph-

      - name: Run codegraph review
        run: |
          npm install -g @vndkubi/codegraph-mcp@^1.2
          codegraph review --base "origin/${{ github.base_ref }}" --format sarif --out codegraph-review.sarif
          codegraph review --base "origin/${{ github.base_ref }}" --format markdown --out codegraph-review.md

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codegraph-review.sarif
          category: codegraph-review

      - name: Sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codegraph-review -->';
            const body = fs.readFileSync('codegraph-review.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
